<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f9fb;
    }

    /* NAVBAR */
    .navbar {
        display: none;
        background: linear-gradient(90deg, #008080, #0077b6);
        padding: 15px;
        color: white;
        justify-content: space-between;
        align-items: center;
    }

    .nav-links a {
        color: white;
        margin: 0 15px;
        text-decoration: none;
        font-weight: bold;
        cursor: pointer;
    }

    .nav-links a:hover {
        text-decoration: underline;
    }

    /* LOGIN PAGE */
    .login-container {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-box {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        width: 300px;
        text-align: center;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #008080;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0077b6;
    }

    /* DASHBOARD */
    .content {
        display: none;
        padding: 20px;
    }

    iframe {
        width: 100%;
        height: 80vh;
        border-radius: 10px;
        border: none;
    }

    /* SECTIONS */
    .section {
        display: none;
    }

    .active {
        display: block;
    }

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-container" id="loginPage">
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="error" style="color:red;"></p>
    </div>
</div>

<!-- NAVBAR -->
<div class="navbar" id="navbar">
    <h3>Dashboard</h3>
    <div class="nav-links">
        <a onclick="showSection('analysis')">Analysis</a>
        <a onclick="showSection('profile')">Profile</a>
        <a onclick="showSection('about')">About Us</a>
        <a onclick="logout()">Logout</a>
    </div>
</div>

<!-- CONTENT -->
<div class="content" id="mainContent">

    <!-- ANALYSIS -->
    <div id="analysis" class="section active">
        <h2>IBM Cognos Analysis</h2>
        <iframe src="https://ap2.ca.analytics.ibm.com/bi/?perspective=dashboard&pathRef=.my_folders%2FCAS%2BSTUDYE%2Bdashboard1&closeWindowOnLastView=true&ui_appbar=false&ui_navbar=false&shareMode=embedded&action=view&mode=dashboard&nav_filter=true"></iframe>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="section">
        <h2>Profile</h2>
        <p><b>Name:</b> Sangeetha</p>
        <p><b>Role:</b> Data Analyst</p>
        <p><b>Tool:</b> IBM Cognos Analytics</p>
    </div>

    <!-- ABOUT -->
    <div id="about" class="section">
        <h2>About Us</h2>
        <p>This dashboard is built using IBM Cognos Analytics to visualize business insights.</p>
    </div>

</div>

<script>

function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "sangeetha" && pass === "ibm123") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("navbar").style.display = "flex";
        document.getElementById("mainContent").style.display = "block";
    } else {
        document.getElementById("error").innerText = "Invalid credentials!";
    }
}

function showSection(sectionId) {
    let sections = document.querySelectorAll(".section");
    sections.forEach(sec => sec.classList.remove("active"));

    document.getElementById(sectionId).classList.add("active");
}

function logout() {
    location.reload();
}

</script>

</body>
</html>
